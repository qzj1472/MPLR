name: build

on:
  push:
    branches:
      - main
    tags:
      - v*
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      publish_release:
        description: Publish a GitHub release
        required: false
        default: false
        type: boolean
      release_channel:
        description: Release channel
        required: false
        default: stable
        type: choice
        options:
          - stable
          - beta
      version_suffix:
        description: Optional beta SemVer suffix, defaults to beta.{run_number}
        required: false
        default: ""
        type: string
      release_tag:
        description: Release tag, defaults to v{version} or v{version}-beta
        required: false
        default: ""
        type: string
      changelog_ref:
        description: Optional branch or ref to read extra stable release notes from
        required: false
        default: ""
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    env:
      PROJECT_PATH: src/MPLR/MPLR.csproj
      PUBLISH_DIR: artifacts/publish/win-x64
      PACKAGE_DIR: artifacts/package
      VELOPACK_DIR: artifacts/velopack
      VELOPACK_VERSION: 1.2.0

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Read version
        id: version
        shell: pwsh
        run: |
          $props = [xml](Get-Content "Directory.Build.props")
          $baseVersion = $props.Project.PropertyGroup.VersionPrefix
          if ([string]::IsNullOrWhiteSpace($baseVersion)) {
            throw "VersionPrefix is empty"
          }
          $releaseChannel = "${{ inputs.release_channel }}".Trim().ToLowerInvariant()
          if ($releaseChannel -notin @("stable", "beta")) {
            $releaseChannel = "stable"
          }
          $versionSuffix = "${{ inputs.version_suffix }}".Trim()
          $inputTag = "${{ inputs.release_tag }}"
          if ($env:GITHUB_REF -like "refs/tags/*") {
            $tag = $env:GITHUB_REF_NAME
          } else {
            $tag = $inputTag.Trim()
          }
          $escapedBaseVersion = [regex]::Escape($baseVersion)
          if (-not [string]::IsNullOrWhiteSpace($tag)) {
            $tagVersion = $tag -replace "^v", ""
            $stableTagMatch = [regex]::Match($tagVersion, "^$escapedBaseVersion$")
            $betaTagMatch = [regex]::Match($tagVersion, "^$escapedBaseVersion-beta(?:\.(.+))?$")
            if ($stableTagMatch.Success) {
              $releaseChannel = "stable"
              $versionSuffix = ""
            } elseif ($betaTagMatch.Success) {
              $releaseChannel = "beta"
              if ([string]::IsNullOrWhiteSpace($versionSuffix) -and $betaTagMatch.Groups[1].Success) {
                $versionSuffix = "beta.$($betaTagMatch.Groups[1].Value)"
              }
            } else {
              throw "Release tag $tag must match v$baseVersion or v$baseVersion-beta"
            }
          }
          if ($releaseChannel -eq "stable" -and -not [string]::IsNullOrWhiteSpace($versionSuffix)) {
            throw "version_suffix can only be used with beta releases"
          }
          if ($releaseChannel -eq "beta" -and [string]::IsNullOrWhiteSpace($versionSuffix)) {
            $versionSuffix = "beta.$env:GITHUB_RUN_NUMBER"
          }
          if ($releaseChannel -eq "beta" -and $versionSuffix -notmatch "^beta(?:\.|$)") {
            throw "Beta version_suffix must start with beta"
          }
          $packageVersion = if ([string]::IsNullOrWhiteSpace($versionSuffix)) { $baseVersion } else { "$baseVersion-$versionSuffix" }
          if ([string]::IsNullOrWhiteSpace($tag)) {
            $tag = if ($releaseChannel -eq "beta") { "v$baseVersion-beta" } else { "v$baseVersion" }
          }
          if ($releaseChannel -eq "beta") {
            $velopackChannel = "win-beta"
            $artifactChannel = "win-x64-beta"
            $isPrerelease = "true"
            $releaseName = "MPLR v$baseVersion Beta"
          } else {
            $velopackChannel = "win"
            $artifactChannel = "win-x64"
            $isPrerelease = "false"
            $releaseName = "MPLR v$baseVersion"
          }
          "version=$baseVersion" >> $env:GITHUB_OUTPUT
          "package_version=$packageVersion" >> $env:GITHUB_OUTPUT
          "version_suffix=$versionSuffix" >> $env:GITHUB_OUTPUT
          "release_channel=$releaseChannel" >> $env:GITHUB_OUTPUT
          "velopack_channel=$velopackChannel" >> $env:GITHUB_OUTPUT
          "artifact_channel=$artifactChannel" >> $env:GITHUB_OUTPUT
          "is_prerelease=$isPrerelease" >> $env:GITHUB_OUTPUT
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "release_name=$releaseName" >> $env:GITHUB_OUTPUT
          "asset_name=MPLR_v$packageVersion`_$artifactChannel.zip" >> $env:GITHUB_OUTPUT
          "setup_asset_name=MPLR_v$packageVersion`_$artifactChannel`_Setup.exe" >> $env:GITHUB_OUTPUT

      - name: Restore
        run: dotnet restore $env:PROJECT_PATH

      - name: Build
        shell: pwsh
        run: |
          $versionProps = @("-p:ReleaseChannel=${{ steps.version.outputs.release_channel }}")
          if (-not [string]::IsNullOrWhiteSpace("${{ steps.version.outputs.version_suffix }}")) {
            $versionProps += "-p:VersionSuffix=${{ steps.version.outputs.version_suffix }}"
          }
          dotnet build $env:PROJECT_PATH -c Release -p:Platform=x64 --no-restore @versionProps

      - name: Test
        shell: pwsh
        run: |
          $versionProps = @("-p:ReleaseChannel=${{ steps.version.outputs.release_channel }}")
          if (-not [string]::IsNullOrWhiteSpace("${{ steps.version.outputs.version_suffix }}")) {
            $versionProps += "-p:VersionSuffix=${{ steps.version.outputs.version_suffix }}"
          }
          dotnet test MPLR.sln -c Release -p:Platform=x64 --no-build @versionProps

      - name: Publish
        shell: pwsh
        run: |
          $versionProps = @("-p:ReleaseChannel=${{ steps.version.outputs.release_channel }}")
          if (-not [string]::IsNullOrWhiteSpace("${{ steps.version.outputs.version_suffix }}")) {
            $versionProps += "-p:VersionSuffix=${{ steps.version.outputs.version_suffix }}"
          }
          dotnet publish $env:PROJECT_PATH -c Release -p:Platform=x64 -p:PublishProfile=FolderProfile -o $env:PUBLISH_DIR @versionProps
          Remove-Item -LiteralPath (Join-Path $env:PUBLISH_DIR "downloads") -Recurse -Force -ErrorAction SilentlyContinue

      - name: Install Velopack CLI
        shell: pwsh
        run: |
          dotnet tool install --global vpk --version $env:VELOPACK_VERSION
          "$env:USERPROFILE\.dotnet\tools" >> $env:GITHUB_PATH

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path $env:PACKAGE_DIR | Out-Null
          $assetPath = Join-Path $env:PACKAGE_DIR "${{ steps.version.outputs.asset_name }}"
          if (Test-Path -LiteralPath $assetPath) {
            Remove-Item -LiteralPath $assetPath -Force
          }
          Compress-Archive -Path (Join-Path $env:PUBLISH_DIR "*") -DestinationPath $assetPath -Force

      - name: Generate release notes
        id: notes
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $packageVersion = "${{ steps.version.outputs.package_version }}"
          $releaseChannel = "${{ steps.version.outputs.release_channel }}"
          $velopackChannel = "${{ steps.version.outputs.velopack_channel }}"
          $tag = "${{ steps.version.outputs.tag }}"
          $notesPath = Join-Path $env:PACKAGE_DIR "release-notes.md"
          $releaseDocPath = "docs/releases/v$version.md"
          $lines = [System.Collections.Generic.List[string]]::new()
          function Add-Separator {
            if ($lines.Count -eq 0) {
              return
            }
            if ($lines.Count -gt 0 -and -not [string]::IsNullOrWhiteSpace($lines[$lines.Count - 1])) {
              $lines.Add("")
            }
            $lines.Add("---")
            $lines.Add("")
          }
          function Add-MarkdownBody([string[]]$content) {
            $start = 0
            if ($content.Count -gt 0 -and $content[0].StartsWith("# ")) {
              $start = 1
              while ($start -lt $content.Count -and [string]::IsNullOrWhiteSpace($content[$start])) {
                $start++
              }
            }
            for ($i = $start; $i -lt $content.Count; $i++) {
              $lines.Add($content[$i])
            }
            if ($lines.Count -gt 0 -and -not [string]::IsNullOrWhiteSpace($lines[$lines.Count - 1])) {
              $lines.Add("")
            }
          }
          function Get-UserFacingSubject([string]$subject) {
            return ($subject -replace "\s+in CI$", "").Trim()
          }
          function Get-GitHubMention([string]$hash, [string]$fallback) {
            $login = gh api "repos/$env:GITHUB_REPOSITORY/commits/$hash" --jq ".author.login // empty" 2>$null
            if ($LASTEXITCODE -eq 0 -and -not [string]::IsNullOrWhiteSpace($login)) {
              return "@$($login.Trim())"
            }
            if ($fallback -match "^[A-Za-z0-9-]+$") {
              return "@$fallback"
            }
            return $fallback
          }
          $openParen = [char]0xff08
          $closeParen = [char]0xff09
          if ($releaseChannel -eq "stable") {
            if (Test-Path -LiteralPath $releaseDocPath) {
              Add-MarkdownBody ([string[]](Get-Content -LiteralPath $releaseDocPath))
            }
            $changelogRef = "${{ inputs.changelog_ref }}".Trim()
            if (-not [string]::IsNullOrWhiteSpace($changelogRef)) {
              $fetchRef = $changelogRef
              if ($fetchRef -match "^origin/(.+)$") {
                $fetchRef = $Matches[1]
              }
              git fetch origin $fetchRef --depth=1
              if ($LASTEXITCODE -eq 0) {
                $resolvedRef = "FETCH_HEAD"
              } else {
                $resolvedRef = $changelogRef
              }
              $extraNotes = git show "$resolvedRef`:$releaseDocPath" 2>$null
              if ($LASTEXITCODE -ne 0 -or [string]::IsNullOrWhiteSpace(($extraNotes -join "`n"))) {
                $extraNotes = git show "$resolvedRef`:CHANGELOG.md" 2>$null
              }
              if ($LASTEXITCODE -eq 0 -and -not [string]::IsNullOrWhiteSpace(($extraNotes -join "`n"))) {
                Add-Separator
                $lines.Add("## Additional Notes From $changelogRef")
                $lines.Add("")
                Add-MarkdownBody ([string[]]$extraNotes)
              }
            }
          } else {
            $lines.Add("## Beta 测试版")
            $lines.Add("")
            $lines.Add("- 此发布用于 Beta 更新通道，会覆盖旧的 Beta 预发布。")
            $lines.Add("- 安装包版本：``$packageVersion``")
            $lines.Add("- 更新通道：``$velopackChannel``")
            $lines.Add("")
          }
          $rangeEnd = "HEAD"
          if ($releaseChannel -eq "stable") {
            git rev-parse $tag 2>$null
            if ($LASTEXITCODE -eq 0) {
              $rangeEnd = "$tag^"
            }
            $previousTag = git tag --merged $rangeEnd --sort=-creatordate | Where-Object { $_ -match "^v[0-9]+\.[0-9]+\.[0-9]+(\.[0-9]+)?$" } | Select-Object -First 1
          } else {
            git rev-parse $tag 2>$null
            if ($LASTEXITCODE -eq 0) {
              $previousTag = $tag
            } else {
              $previousTag = git tag --merged $rangeEnd --sort=-creatordate | Where-Object { $_ -match "^v[0-9]+\.[0-9]+\.[0-9]+(\.[0-9]+)?$" } | Select-Object -First 1
            }
          }
          if ($LASTEXITCODE -ne 0 -or [string]::IsNullOrWhiteSpace($previousTag)) {
            $previousTag = git rev-list --max-parents=0 HEAD
          }
          $commitRows = git log --pretty=format:"%s%x1f%H%x1f%h%x1f%an" "$previousTag..HEAD"
          Add-Separator
          $lines.Add("### Commits")
          $lines.Add("")
          if ([string]::IsNullOrWhiteSpace(($commitRows -join "`n"))) {
            $lines.Add("- No commits found in range.")
          } else {
            foreach ($row in $commitRows) {
              $parts = $row -split [char]0x1f
              if ($parts.Count -ge 4) {
                $subject = Get-UserFacingSubject $parts[0]
                $mention = Get-GitHubMention $parts[1] $parts[3]
                $lines.Add("- $subject$openParen$($parts[2])$closeParen $mention")
              }
            }
          }
          $lines | Set-Content -LiteralPath $notesPath -Encoding utf8
          "path=$notesPath" >> $env:GITHUB_OUTPUT

      - name: Package Velopack
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          New-Item -ItemType Directory -Force -Path $env:VELOPACK_DIR | Out-Null
          $downloadArgs = @("--yes", "download", "github", "--repoUrl", "https://github.com/$env:GITHUB_REPOSITORY", "--outputDir", $env:VELOPACK_DIR, "--token", $env:GH_TOKEN, "--channel", "${{ steps.version.outputs.velopack_channel }}")
          if ("${{ steps.version.outputs.is_prerelease }}" -eq "true") {
            $downloadArgs += "--pre"
          }
          & vpk @downloadArgs
          if ($LASTEXITCODE -ne 0) {
            Write-Host "No previous Velopack release assets were downloaded; building a full package only."
          }
          vpk --yes pack --packId MPLR --packTitle MPLR --packVersion "${{ steps.version.outputs.package_version }}" --packDir $env:PUBLISH_DIR --mainExe MPLR.exe --outputDir $env:VELOPACK_DIR --icon src/MPLR/Assets/Favicon.ico --releaseNotes "${{ steps.notes.outputs.path }}" --packAuthors qzj1472 --channel "${{ steps.version.outputs.velopack_channel }}"
          if ($LASTEXITCODE -ne 0) {
            throw "Velopack pack failed"
          }
          $setupPath = Get-ChildItem -LiteralPath $env:VELOPACK_DIR -Filter "*Setup.exe" -File | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if ($null -eq $setupPath) {
            throw "Velopack setup exe was not generated"
          }
          $friendlySetupPath = Join-Path $env:VELOPACK_DIR "${{ steps.version.outputs.setup_asset_name }}"
          if ($setupPath.FullName -ne $friendlySetupPath) {
            Move-Item -LiteralPath $setupPath.FullName -Destination $friendlySetupPath -Force
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MPLR_v${{ steps.version.outputs.package_version }}_${{ steps.version.outputs.artifact_channel }}
          path: |
            ${{ env.PACKAGE_DIR }}/${{ steps.version.outputs.asset_name }}
            ${{ env.PACKAGE_DIR }}/release-notes.md
            ${{ env.VELOPACK_DIR }}/*

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.publish_release == 'true')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ steps.version.outputs.tag }}"
          $releaseName = "${{ steps.version.outputs.release_name }}"
          $isPrerelease = "${{ steps.version.outputs.is_prerelease }}" -eq "true"
          $assetPath = Join-Path $env:PACKAGE_DIR "${{ steps.version.outputs.asset_name }}"
          $velopackDir = $env:VELOPACK_DIR
          $notesPath = "${{ steps.notes.outputs.path }}"
          function Remove-RemoteTag([string]$oldTag) {
            git push origin ":refs/tags/$oldTag" 2>$null
            if ($LASTEXITCODE -ne 0) {
              Write-Host "Remote tag $oldTag was not present or could not be deleted."
            }
          }
          function Remove-ReleaseAndTag([string]$oldTag) {
            gh release delete $oldTag --cleanup-tag --yes 2>$null
            if ($LASTEXITCODE -ne 0) {
              Remove-RemoteTag $oldTag
            }
          }
          git fetch origin --tags --force
          if ($isPrerelease) {
            $betaTagPattern = "^v[0-9]+\.[0-9]+\.[0-9]+(\.[0-9]+)?-beta(\..*)?$"
            $releaseTags = gh release list --limit 200 --json tagName --jq ".[].tagName" 2>$null
            if ($LASTEXITCODE -eq 0) {
              foreach ($oldTag in $releaseTags) {
                if ($oldTag -match $betaTagPattern) {
                  Remove-ReleaseAndTag $oldTag
                }
              }
            }
            $remoteTags = git ls-remote --tags origin "refs/tags/v*-beta*" 2>$null | ForEach-Object { ($_ -split "\s+")[1] -replace "^refs/tags/", "" -replace "\^\{\}$", "" } | Sort-Object -Unique
            foreach ($oldTag in $remoteTags) {
              if ($oldTag -match $betaTagPattern) {
                Remove-RemoteTag $oldTag
              }
            }
            git tag -d $tag 2>$null
            git tag -f $tag $env:GITHUB_SHA
            git push origin "refs/tags/$tag" --force
          } else {
            git rev-parse $tag 2>$null
            if ($LASTEXITCODE -ne 0) {
              git tag $tag $env:GITHUB_SHA
              git push origin $tag
            }
          }
          $uploadArgs = @("--yes", "upload", "github", "--repoUrl", "https://github.com/$env:GITHUB_REPOSITORY", "--outputDir", $velopackDir, "--token", $env:GH_TOKEN, "--publish", "--merge", "--releaseName", $releaseName, "--tag", $tag, "--channel", "${{ steps.version.outputs.velopack_channel }}")
          if ($isPrerelease) {
            $uploadArgs += "--pre"
          }
          & vpk @uploadArgs
          if ($LASTEXITCODE -ne 0) {
            throw "Velopack upload failed"
          }
          gh release view $tag 2>$null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $assetPath --clobber
            $editArgs = @($tag, "--title", $releaseName, "--notes-file", $notesPath)
            if ($isPrerelease) {
              $editArgs += "--prerelease"
            } else {
              $editArgs += "--latest"
            }
            gh release edit @editArgs
          } else {
            $createArgs = @($tag, $assetPath, "--title", $releaseName, "--notes-file", $notesPath, "--target", $env:GITHUB_SHA)
            if ($isPrerelease) {
              $createArgs += "--prerelease"
            }
            gh release create @createArgs
          }
